
<!DOCTYPE html>
<html>
<head>
    <!--<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>-->
    <script src="jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <link rel="stylesheet" href="ngordnet.css">
</head>
<body>

<p><!--<canvas id="myCanvas" width="400" height="400" style="border:1px solid #d3d3d3;">

    <img src="blank.png" id="plot">
    <textarea class="textresult" id="textresult"></textarea>
    <div id="graph-container-wrapper" class="graph-wrapper">
        <div id="cy"></div>
        <div id="node-popup" class="node-popup hiddentext">
            <button type="button" class="node-popup-close" id="node-popup-close" aria-label="Close">&times;</button>
            <div id="node-popup-content"></div>
        </div>
    </div>
    <div id="synset-chooser" class="synset-chooser hiddentext">
        <p>Choose a synset for "<span id="synset-chooser-word"></span>":</p>
        <div id="synset-options"></div>
    </div>
</p>

<table>
    <tr>
        <td>
            words<br>
            <input type="text" id="words"><br>
        </td>
        <td>
            start<br>
            <input type="text" id="start" value="2000"><br>
        </td>
        <td>
            end<br>
            <input type="text" id="end" value="2020"><br>
        </td>
        <td>
            k<br>
            <input type="text" id="k" value="0"><br>
        </td>
    </tr>
</table>
<table>
    <tr>
        <!--<td>
            <div class="btn" id = "history">history</div>
        </td>-->
        <td>
            <div class="btn" id="historytext">history (text)</div>
        </td>
        <td>
            <div class="btn" id="hyponyms">hyponyms</div>
        </td>
        <td>
            <div class="btn" id="visualize-graph">visualize graph</div>
        </td>
    </tr>
</table>

<script src="ngordnet.js"></script>
</body>
</html>
